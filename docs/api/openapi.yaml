  /projects/{projectId}/episodes/{epId}/audio/music/generate:
    post:
      summary: 生成全集配乐
      description: |
        根据分镜节点的 music_mood 提取情绪序列，调用音乐 Adapter 生成整集背景音乐，
        按节点 duration_target 切割为分段，自动应用 Duck（有台词节点压低音量），
        检测相邻节点情绪差异过大时返回警告。
      operationId: generateEpisodeMusic
      tags:
        - Music
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: epId
          in: path
          required: true
          schema:
            type: string
            pattern: '^ep-\d+$'
          description: 集标识，格式 ep-{number}
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  maxLength: 100
                  description: 音乐 Adapter provider ID
                style_tags:
                  type: array
                  maxItems: 20
                  items:
                    type: string
                    maxLength: 50
                  description: 题材风格标签（覆盖项目 meta 中的 style_tags）
                crossfade_duration:
                  type: number
                  minimum: 0.1
                  maximum: 1.0
                  default: 0.4
                  description: 交叉淡化时长（秒）
      responses:
        '201':
          description: 配乐生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/EpisodeMusicResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

