openapi: 3.0.3
info:
  title: 极简栈创造 AI 生成接口
  description: |
    涉及 AI 适配器层的对外接口规范，包括模型绑定、生成任务、Adapter 健康检查。
  version: 1.0.0
  contact:
    name: Core · 后端工程师
servers:
  - url: /api/v1
    description: 本地开发服务

paths:
  /projects:
    get:
      summary: 列出项目
      description: 返回当前用户的项目列表，支持状态筛选、标题搜索、排序和分页。
      operationId: listProjects
      tags:
        - Projects
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: search
          in: query
          schema:
            type: string
          description: 标题关键字搜索
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - updated_at_asc
              - updated_at_desc
            default: updated_at_desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectList'
    post:
      summary: 创建项目
      description: 创建新项目，初始状态为 draft，不触发 AI 生成。
      operationId: createProject
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'

  /projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取项目详情
      operationId: getProject
      tags:
        - Projects
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: 更新项目
      operationId: updateProject
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 删除项目
      operationId: deleteProject
      tags:
        - Projects
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 列出项目角色
      description: 返回指定项目下的所有角色卡片。
      operationId: listCharacters
      tags:
        - Characters
      responses:
        '200':
          description: 角色列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/CharacterList'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: 创建角色卡片
      description: 手动创建角色卡片。
      operationId: createCharacter
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/auto-create:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 根据大纲自动创建角色
      description: 根据已确认大纲中的 characters[] 批量创建角色卡片。
      operationId: autoCreateCharacters
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoCreateCharactersRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取角色详情
      operationId: getCharacter
      tags:
        - Characters
      responses:
        '200':
          description: 角色详情
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: 更新角色卡片
      description: 更新角色字段，自动触发版本快照。
      operationId: updateCharacter
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCharacterRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 删除角色
      operationId: deleteCharacter
      tags:
        - Characters
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/generate-views:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成三视图
      description: 为角色生成正面、侧面、背面三视图。
      operationId: generateCharacterViews
      tags:
        - Characters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateViewsRequest'
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/generate-views/{viewId}/retry:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: viewId
        in: path
        required: true
        schema:
          type: string
          enum:
            - front
            - side
            - back
    post:
      summary: 重新生成单张视图
      description: 对指定视图（front/side/back）重新生成。
      operationId: retryCharacterView
      tags:
        - Characters
      responses:
        '200':
          description: 重新生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/confirm-views:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认三视图
      description: 确认三视图并锁定参考图，自动触发扩展参考图生成。
      operationId: confirmCharacterViews
      tags:
        - Characters
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/generate-refs:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成扩展参考图
      description: 生成表情组（4 张）与场景站立图（2 张）。
      operationId: generateCharacterRefs
      tags:
        - Characters
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/rollback:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 回滚到指定版本
      description: 基于历史版本快照恢复角色数据。
      operationId: rollbackCharacter
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackCharacterRequest'
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 列出项目场景卡片
      description: 返回指定项目下的所有场景（location）卡片。
      operationId: listLocations
      tags:
        - Locations
      responses:
        '200':
          description: 场景卡片列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/LocationList'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: 更新场景卡片
      description: 更新场景字段，自动触发版本快照。
      operationId: updateLocation
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/generate-base:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成基准候选图
      description: 基于场景字段生成 3 张基准候选图，返回候选 URL 与 seed，不持久化。
      operationId: generateBaseCandidates
      tags:
        - Locations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateBaseCandidatesRequest'
      responses:
        '200':
          description: 候选图列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BaseCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/confirm-base:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认基准图
      description: 确认选中的基准候选图，持久化 base_seed 与 base_image_url，触发版本快照。
      operationId: confirmBaseImage
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBaseRequest'
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/generate-variant:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成变体图
      description: 基于已确认的 base_seed 与固定偏移生成指定变体图，返回 URL 与 seed，不持久化。
      operationId: generateLocationVariant
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateVariantRequest'
      responses:
        '200':
          description: 变体图结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/VariantResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/confirm-variant:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认变体图
      description: 确认变体图并持久化到 variants 字典，key 为 `{time_of_day}-{weather}`，触发版本快照。
      operationId: confirmLocationVariant
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmVariantRequest'
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/versions:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取场景历史版本
      description: 返回场景卡片的版本快照列表（不含完整 content）。
      operationId: listLocationVersions
      tags:
        - Locations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/SnapshotHistory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/rollback:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 回滚场景到指定版本
      description: 基于历史版本快照恢复场景卡片数据。
      operationId: rollbackLocation
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackLocationRequest'
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取大纲
      description: 返回当前项目的大纲数据及锁定状态。无大纲时返回 outline: null 而非 404。
      operationId: getOutline
      tags:
        - Outline
      responses:
        '200':
          description: 大纲摘要（含锁定状态）
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineSummary'
    put:
      summary: 更新大纲
      description: 保存用户编辑后的大纲，自动创建 user_edited 版本快照。
      operationId: updateOutline
      tags:
        - Outline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOutlineRequest'
      responses:
        '200':
          description: 更新后的大纲
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/generate:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成大纲
      description: 调用文本 AI 生成结构化大纲，存储到 project.outline 字段并创建 ai_generated 版本快照。
      operationId: generateOutline
      tags:
        - Outline
      responses:
        '201':
          description: 大纲生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/validate:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 剧本医生自洽性检查
      description: 执行大纲自洽性检查（角色位置矛盾、道具状态追踪、情绪曲线、服装连续性），返回检查报告。
      operationId: validateOutline
      tags:
        - Outline
      responses:
        '200':
          description: 检查报告
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineValidationReport'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/confirm:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认并锁定大纲
      description: 锁定大纲（outline_locked = true），项目状态变更为 asset_prep。存在红色错误时拒绝锁定。
      operationId: confirmOutline
      tags:
        - Outline
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
