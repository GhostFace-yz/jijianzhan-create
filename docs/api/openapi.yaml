        直接上传视频文件替换指定分镜节点的 video_clip。
        文件会写入存储服务并返回可访问 URL；未提供 duration 时使用节点的 duration_target。
        上传后片段状态为 generated，可继续走审核流程。
      operationId: uploadNodeVideoFile
      tags:
        - Video
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: epId
          in: path
          required: true
          schema:
            type: string
            pattern: '^ep-\d+$'
        - name: nodeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - video
              properties:
                video:
                  type: string
                  format: binary
                  description: 视频文件（video/*）
                duration:
                  type: number
                  minimum: 0.1
                  description: 上传视频片段时长（秒），未提供时使用节点 duration_target
                camera_move:
                  type: string
                  maxLength: 100
                  description: 可选：覆盖节点默认运镜指令
                motion_description:
                  type: string
                  maxLength: 2000
                  description: 可选：覆盖节点默认动作描述
      responses:
        '201':
          description: 上传成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/VideoClip'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/episodes/{epId}/render:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: epId
        in: path
        required: true
        schema:
          type: string
          pattern: '^ep-\d+$'
        description: 集标识，格式 ep-{number}
    post:
      summary: 开始合成输出
      description: |
        将本集所有已生成的视频片段按时间轴拼接，应用转场，混合配音与配乐，添加字幕并编码为 MP4。
        需要前置完成：分镜节点拆分、TTS 配音生成、配乐生成、视频片段生成。

        真实渲染模式下，任务会异步入队并立即返回 `queued` 状态与 `job_id`，由独立 Worker 消费执行；
        降级/测试模式下可能同步完成并返回 `completed`。
      operationId: startRender
      tags:
        - Render
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderOptions'
      responses:
        '202':
          description: 合成任务已入队，等待 Worker 执行
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/EpisodeRenderOutput'
        '201':
          description: 合成任务已同步完成（降级/测试模式）
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/EpisodeRenderOutput'

  /projects/{projectId}/episodes/{epId}/render/progress:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: epId
        in: path
        required: true
        schema:
          type: string
          pattern: '^ep-\d+$'
        description: 集标识，格式 ep-{number}
    get:
      summary: 查询合成进度
      description: 返回指定剧集的合成状态、进度百分比与输出信息。
      operationId: getRenderProgress
      tags:
        - Render
      responses:
        '200':
          description: 合成进度
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/EpisodeRenderOutput'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/episodes/{epId}/render/download:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: epId
        in: path
        required: true
        schema:
          type: string
          pattern: '^ep-\d+$'
        description: 集标识，格式 ep-{number}
    get:
      summary: 下载最终 MP4
      description: 合成完成后返回最终 MP4 下载链接。
      operationId: getRenderDownload
      tags:
        - Render
      responses:
        '200':
          description: 下载链接
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: object
                    required:
                      - url
                    properties:
                      url:
                        type: string
                        format: uri
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    AudioClip:
      type: object
      required:
        - url
        - duration
        - voice_id
        - emotion
        - speed
        - generated_at
        - status
      properties:
        url:
          type: string
          format: uri
        duration:
          type: number
        voice_id:
          type: string
        emotion:
          type: string
        speed:
          type: number
        generated_at:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - pending
            - generated
            - reviewed
        reviewed_at:
          type: string
          format: date-time
        review_comment:
          type: string
        reviewed:
          type: boolean

    TtsGenerateOptions:
      type: object
      properties:
        speed:
          type: number
          minimum: 0.8
          maximum: 1.2
        emotion:
          type: string
          maxLength: 50
        voice_id:
          type: string
          maxLength: 100
        force:
          type: boolean
        provider:
          type: string
          maxLength: 50

    TtsReviewInput:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
        comment:
          type: string
          maxLength: 500

    TtsUploadInput:
      type: object
      required:
        - url
        - duration
      properties:
        url:
          type: string
          format: uri
        duration:
          type: number
          exclusiveMinimum: 0

    TtsNodeResult:
      type: object
      required:
        - node_id
        - audio_clip
        - skipped
      properties:
        node_id:
          type: string
        audio_clip:
          $ref: '#/components/schemas/AudioClip'
        skipped:
          type: boolean
        skip_reason:
          type: string
        error:
          type: string

    TtsBatchResult:
      type: object
      required:
        - episode_id
        - total_nodes
        - nodes_with_dialogue
        - nodes_generated
        - nodes_skipped
        - nodes_failed
        - success_rate
        - results
      properties:
        episode_id:
          type: string
        total_nodes:
          type: integer
        nodes_with_dialogue:
          type: integer
        nodes_generated:
          type: integer
        nodes_skipped:
          type: integer
        nodes_failed:
          type: integer
        success_rate:
          type: number
        results:
          type: array
          items:
            $ref: '#/components/schemas/TtsNodeResult'


    VideoClip:
      type: object
      required:
        - url
        - duration
        - camera_move
        - motion_description
        - generated_at
        - status
        - quality_report
        - provider
        - model
        - fallback_used
      properties:
        url:
          type: string
          format: uri
        duration:
          type: number
        camera_move:
          type: string
          description: 映射后的英文运镜指令
        motion_description:
          type: string
        generated_at:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - pending
            - generated
            - reviewed
        reviewed_at:
          type: string
          format: date-time
        review_comment:
          type: string
        reviewed:
          type: boolean
        quality_report:
          $ref: '#/components/schemas/QualityReport'
        provider:
          type: string
        model:
          type: string
        fallback_used:
          type: boolean

    QualityReport:
      type: object
      required:
        - actual_duration
        - target_duration
        - duration_ok
        - face_corruption_detected
        - motion_jump_detected
        - passed
        - details
      properties:
        actual_duration:
          type: number
        target_duration:
          type: number
        duration_ok:
          type: boolean
        face_corruption_detected:
          type: boolean
        motion_jump_detected:
          type: boolean
        passed:
          type: boolean
        details:
          type: array
          items:
            type: string

    VideoGenerateOptions:
      type: object
      properties:
        provider:
          type: string
          maxLength: 50
          description: 主视频 Adapter provider ID
        fallback_provider:
          type: string
          maxLength: 50
          description: fallback provider ID，默认 mock-video-fallback
        force:
          type: boolean
          description: 是否强制重新生成
        concurrency:
          type: integer
          minimum: 1
          maximum: 10
          default: 3
          description: in-process 队列并发数
        duration:
          type: number
          minimum: 3
          maximum: 15
          description: 覆盖节点默认时长
        face_enhancement:
          type: boolean
          description: 是否开启人脸增强

    VideoReviewInput:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
        comment:
          type: string
          maxLength: 500

    VideoUploadInput:
      type: object
      required:
        - url
        - duration
      properties:
        url:
          type: string
          format: uri
          description: 上传视频片段的可访问 URL
        duration:
          type: number
          minimum: 0.1
          description: 上传视频片段时长（秒）
        camera_move:
          type: string
          maxLength: 100
          description: 可选，覆盖节点默认运镜指令
        motion_description:
          type: string
          maxLength: 2000
          description: 可选，覆盖节点默认动作描述

    VideoNodeResult:
      type: object
      required:
        - node_id
        - video_clip
        - skipped
      properties:
        node_id:
          type: string
        video_clip:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/VideoClip'
        skipped:
          type: boolean
        skip_reason:
          type: string
        error:
          type: string

    VideoBatchResult:
      type: object
      required:
        - episode_id
        - total_nodes
        - nodes_generated
        - nodes_skipped
        - nodes_failed
        - success_rate
        - fallback_used_count
        - quality_passed_count
        - results
      properties:
        episode_id:
          type: string
        total_nodes:
          type: integer
        nodes_generated:
          type: integer
        nodes_skipped:
          type: integer
        nodes_failed:
          type: integer
        success_rate:
          type: number
        fallback_used_count:
          type: integer
        quality_passed_count:
          type: integer
        results:
          type: array
          items:
            $ref: '#/components/schemas/VideoNodeResult'

    ProjectStatus:
      type: string
      enum:
        - draft
        - outlining
        - asset_prep
        - producing
        - completed

    ProjectGenre:
      type: string
      enum:
        - urban_romance
        - ancient_costume
        - suspense
        - comedy
        - sci_fi
        - other

    ProjectDurationGoal:
      type: string
      enum:
        - 3min
        - 5min
        - 10min

    ProjectStyleTag:
      type: string
      enum:
        - realistic
        - comic
        - cyberpunk
        - chinese_style
        - fresh
        - dark

    ProjectMeta:
      type: object
      required:
        - title
        - description
        - genre
        - style_tags
      properties:
        title:
          type: string
          maxLength: 50
          description: 项目标题
        description:
          type: string
          maxLength: 1000
          description: 创意描述
        genre:
          $ref: '#/components/schemas/ProjectGenre'
        target_episodes:
          type: integer
          minimum: 1
          maximum: 100
          nullable: true
          description: 目标集数，留空表示由 AI 后续建议
        duration_goal:
          $ref: '#/components/schemas/ProjectDurationGoal'
          nullable: true
          description: 时长目标
        style_tags:
          type: array
          items:
            $ref: '#/components/schemas/ProjectStyleTag'
          description: 风格标签
        notes:
          type: string
          maxLength: 2000
          nullable: true
          description: 创作备注

    Project:
      type: object
      required:
        - id
        - user_id
        - status
        - meta
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        team_id:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        meta:
          $ref: '#/components/schemas/ProjectMeta'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectList:
      type: object
      required:
        - total
        - projects
      properties:
        total:
          type: integer
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    CreateProjectRequest:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/ProjectMeta'

    UpdateProjectRequest:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/ProjectMeta'
        status:
          $ref: '#/components/schemas/ProjectStatus'

    ModelConfig:
      type: object
      required:
        - provider
        - model
      properties:
        provider:
          type: string
          description: Provider ID，对应已注册的 Adapter
          example: mock-text
        model:
          type: string
          description: 模型标识
          example: mock-model
        apiKey:
          type: string
          description: 运行时注入的 API Key，不持久化
          writeOnly: true
        baseUrl:
          type: string
          format: uri
          description: 自定义 endpoint
        extraParams:
          type: object
          description: 供应商特有参数透传
        timeoutMs:
          type: integer
          description: 请求超时毫秒
          example: 30000
        maxRetries:
          type: integer
          description: 最大重试次数
          example: 2

    ModelBinding:
      type: object
      required:
        - taskType
        - primary
      properties:
        taskType:
          type: string
          enum:
            - text
            - image
            - video
            - tts
            - music
            - render
          description: 任务类型
        primary:
          $ref: '#/components/schemas/ModelConfig'
        fallbacks:
          type: array
          description: 按优先级排序的备用模型配置
          items:
            $ref: '#/components/schemas/ModelConfig'

    ProjectModelBindings:
      type: object
      required:
        - outline
        - script
        - storyboard
        - character_img
        - scene_img
        - video
        - video_fallback
        - tts
        - music
      properties:
        outline:
          $ref: '#/components/schemas/ModelBinding'
        script:
          $ref: '#/components/schemas/ModelBinding'
        storyboard:
          $ref: '#/components/schemas/ModelBinding'
        character_img:
          $ref: '#/components/schemas/ModelBinding'
        scene_img:
          $ref: '#/components/schemas/ModelBinding'
        video:
          $ref: '#/components/schemas/ModelBinding'
        video_fallback:
          $ref: '#/components/schemas/ModelBinding'
        tts:
          $ref: '#/components/schemas/ModelBinding'
        music:
          $ref: '#/components/schemas/ModelBinding'
        render:
          $ref: '#/components/schemas/ModelBinding'

    GenerationTaskRequest:
      type: object
      required:
        - taskType
        - nodeId
        - params
      properties:
        taskType:
          type: string
          enum:
            - text
            - image
            - video
            - tts
            - music
          description: 生成任务类型
        nodeId:
          type: string
          description: 触发生成的节点 ID
        episodeId:
          type: string
          description: 所属单集 ID
        params:
          type: object
          description: 生成参数，按任务类型不同
        modelBinding:
          $ref: '#/components/schemas/ModelBinding'
          description: 节点级模型绑定覆盖，不传则使用项目默认

    GenerationTaskResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
        eventsUrl:
          type: string
          format: uri
          description: SSE 进度推送地址
          example: /api/v1/events/{jobId}

    AdapterHealthReport:
      type: object
      required:
        - text
        - image
        - video
        - tts
        - music
      properties:
        text:
          $ref: '#/components/schemas/ProviderHealthMap'
        image:
          $ref: '#/components/schemas/ProviderHealthMap'
        video:
          $ref: '#/components/schemas/ProviderHealthMap'
        tts:
          $ref: '#/components/schemas/ProviderHealthMap'
        music:
          $ref: '#/components/schemas/ProviderHealthMap'

    ProviderHealthMap:
      type: object
      additionalProperties:
        type: string
        enum:
          - available
          - degraded
          - unavailable

    AdapterProviderList:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            type: object
            required:
              - taskType
              - provider
            properties:
              taskType:
                type: string
                enum:
                  - text
                  - image
                  - video
                  - tts
                  - music
              provider:
                type: string

    EntityType:
      type: string
      enum:
        - project
        - outline
        - character
        - scene
        - script
        - node
        - generation_result
        - location
      description: 可编辑实体类型

    SnapshotSource:
      type: string
      enum:
        - ai_generated
        - user_edited
        - ai_regenerated
        - locked
      description: 版本快照来源

    AIModelInfo:
      type: object
      required:
        - provider
        - model
      properties:
        provider:
          type: string
          example: openai
        model:
          type: string
          example: gpt-4o

    SnapshotMeta:
      type: object
      required:
        - id
        - versionId
        - versionNumber
        - source
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        versionId:
          type: string
          example: v3
          pattern: '^v\d+$'
        versionNumber:
          type: integer
          example: 3
        source:
          $ref: '#/components/schemas/SnapshotSource'
        editedBy:
          type: string
          nullable: true
          description: 用户编辑时的用户 ID
        aiModel:
          $ref: '#/components/schemas/AIModelInfo'
          nullable: true
          description: AI 生成时记录的模型配置
        promptOverride:
          type: string
          nullable: true
          description: 用户给 AI 的额外指令
        parentVersionNumber:
          type: integer
          nullable: true
          description: 父版本号
        createdAt:
          type: string
          format: date-time

    Snapshot:
      allOf:
        - $ref: '#/components/schemas/SnapshotMeta'
        - type: object
          required:
            - content
            - diff
          properties:
            content:
              type: object
              description: 该版本的完整内容
            diff:
              type: object
              additionalProperties:
                type: string
                enum:
                  - added
                  - changed
                  - removed
              description: 与父版本的字段级差异

    SnapshotHistory:
      type: object
      required:
        - total
        - versions
      properties:
        total:
          type: integer
        versions:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotMeta'

    DiffResult:
      type: object
      required:
        - fromVersionId
        - toVersionId
        - diff
      properties:
        fromVersionId:
          type: string
          example: v1
        toVersionId:
          type: string
          example: v3
        diff:
          type: object
          additionalProperties:
            type: string
            enum:
              - added
              - changed
              - removed
          description: 字段级差异，键为点号路径

    SnapshotCreateRequest:
      type: object
      required:
        - source
        - content
      properties:
        source:
          $ref: '#/components/schemas/SnapshotSource'
        content:
          type: object
          description: 该版本的完整内容
        edited_by:
          type: string
          description: 用户编辑时的用户 ID
        ai_model:
          $ref: '#/components/schemas/AIModelInfo'
        prompt_override:
          type: string
          description: 用户给 AI 的额外指令

    RollbackRequest:
      type: object
      properties:
        edited_by:
          type: string
          description: 执行回滚的用户 ID

    CharacterRoleType:
      type: string
      enum:
        - protagonist
        - supporting
        - antagonist
      description: 角色定位

    CharacterStatus:
      type: string
      enum:
        - draft
        - confirmed
      description: 角色状态

    CharacterRefImage:
      type: object
      required:
        - view
        - url
        - seed
      properties:
        view:
          type: string
          description: 视图或参考图类型标识
        url:
          type: string
          format: uri
          description: 图片 URL
        seed:
          type: integer
          description: 生成使用的种子

    Character:
      type: object
      required:
        - id
        - project_id
        - name
        - role_type
        - status
        - ref_images
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        role_type:
          $ref: '#/components/schemas/CharacterRoleType'
        episode_range:
          type: string
          nullable: true
          description: 登场集数范围
        appearance:
          type: string
          nullable: true
          description: 外貌描述
        costume:
          type: string
          nullable: true
          description: 服装方案
        expression:
          type: string
          nullable: true
          description: 表情特征
        signature_action:
          type: string
          nullable: true
          description: 标志性动作
        voice_description:
          type: string
          nullable: true
          description: 声线描述
        status:
          $ref: '#/components/schemas/CharacterStatus'
        ref_images:
          type: array
          items:
            $ref: '#/components/schemas/CharacterRefImage'
        ip_adapter_id:
          type: string
          nullable: true
          description: IP-Adapter 角色 Embedding ID
        lora_path:
          type: string
          nullable: true
          description: LoRA 模型路径
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CharacterList:
      type: object
      required:
        - total
        - characters
      properties:
        total:
          type: integer
        characters:
          type: array
          items:
            $ref: '#/components/schemas/Character'

    CreateCharacterRequest:
      type: object
      required:
        - name
        - role_type
      properties:
        name:
          type: string
          maxLength: 100
        role_type:
          $ref: '#/components/schemas/CharacterRoleType'
        episode_range:
          type: string
          maxLength: 50
          nullable: true
        appearance:
          type: string
          maxLength: 2000
          nullable: true
        costume:
          type: string
          maxLength: 2000
          nullable: true
        expression:
          type: string
          maxLength: 2000
          nullable: true
        signature_action:
          type: string
          maxLength: 500
          nullable: true
        voice_description:
          type: string
          maxLength: 500
          nullable: true
        status:
          $ref: '#/components/schemas/CharacterStatus'

    UpdateCharacterRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        role_type:
          $ref: '#/components/schemas/CharacterRoleType'
        episode_range:
          type: string
          maxLength: 50
          nullable: true
        appearance:
          type: string
          maxLength: 2000
          nullable: true
        costume:
          type: string
          maxLength: 2000
          nullable: true
        expression:
          type: string
          maxLength: 2000
          nullable: true
        signature_action:
          type: string
          maxLength: 500
          nullable: true
        voice_description:
          type: string
          maxLength: 500
          nullable: true
        status:
          $ref: '#/components/schemas/CharacterStatus'

    AutoCreateCharactersRequest:
      type: object
      required:
        - characters
      properties:
        characters:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateCharacterRequest'

    GenerateViewsRequest:
      type: object
      properties:
        seed:
          type: integer
          description: 固定种子，不传则根据角色 ID 与视图计算
        width:
          type: integer
        height:
          type: integer
        style_preset:
          type: string

    RollbackCharacterRequest:
      type: object
      required:
        - version_id
      properties:
        version_id:
          type: string
          pattern: '^v\d+$'
          description: 目标版本号

    LocationStatus:
      type: string
      enum:
        - draft
        - confirmed
      description: 场景卡片状态

    LocationVariant:
      type: object
      required:
        - image_url
        - prompt
        - seed
      properties:
        image_url:
          type: string
          format: uri
        prompt:
          type: string
        seed:
          type: integer

    Location:
      type: object
      required:
        - id
        - project_id
        - name
        - status
        - key_props
        - variants
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        frequency:
          type: string
          nullable: true
        space_type:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
        color_tone:
          type: string
          nullable: true
        lighting_type:
          type: string
          nullable: true
        key_props:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/LocationStatus'
        base_seed:
          type: integer
          nullable: true
        base_image_url:
          type: string
          format: uri
          nullable: true
        variants:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LocationVariant'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LocationList:
      type: object
      required:
        - total
        - locations
      properties:
        total:
          type: integer
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    UpdateLocationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 2000
          nullable: true
        frequency:
          type: string
          maxLength: 50
          nullable: true
        space_type:
          type: string
          maxLength: 50
          nullable: true
        style:
          type: string
          maxLength: 200
          nullable: true
        color_tone:
          type: string
          maxLength: 100
          nullable: true
        lighting_type:
          type: string
          maxLength: 100
          nullable: true
        key_props:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/LocationStatus'

    BaseCandidate:
      type: object
      required:
        - url
        - seed
        - prompt
      properties:
        url:
          type: string
          format: uri
        seed:
          type: integer
        prompt:
          type: string

    GenerateBaseCandidatesRequest:
      type: object
      properties:
        seed:
          type: integer
          description: 固定种子，不传则根据 locationId 计算

    ConfirmBaseRequest:
      type: object
      required:
        - candidate
      properties:
        candidate:
          $ref: '#/components/schemas/BaseCandidate'

    VariantResult:
      type: object
      required:
        - url
        - seed
        - prompt
      properties:
        url:
          type: string
          format: uri
        seed:
          type: integer
        prompt:
          type: string

    GenerateVariantRequest:
      type: object
      required:
        - time_of_day
        - weather
      properties:
        time_of_day:
          type: string
        weather:
          type: string

    ConfirmVariantRequest:
      type: object
      required:
        - time_of_day
        - weather
        - variant
      properties:
        time_of_day:
          type: string
        weather:
          type: string
        variant:
          $ref: '#/components/schemas/VariantResult'

    RollbackLocationRequest:
      type: object
      required:
        - version_id
      properties:
        version_id:
          type: string
          pattern: '^v\d+$'
          description: 目标版本号

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 统一错误码
          example: AI_TIMEOUT
        message:
          type: string
          description: 错误信息（不暴露堆栈）
        retryable:
          type: boolean
          description: 是否为可用性错误，可触发 fallback

    # ── Outline Schemas ────────────────────────────────────────────

    OutlineCharacter:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: 角色名
        role_type:
          type: string
          enum:
            - protagonist
            - supporting
            - antagonist
          description: 角色定位（AI 生成时必填，前端更新时可省略）
        description:
          type: string
          description: 角色描述

    OutlineLocation:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: 场景名
        description:
          type: string
          description: 场景描述

    OutlineEpisode:
      type: object
      required:
        - episode_number
        - title
        - summary
        - key_events
        - featured_characters
        - featured_locations
      properties:
        episode_number:
          type: integer
          minimum: 1
          description: 集号
        title:
          type: string
          description: 集标题
        summary:
          type: string
          description: 集摘要
        key_events:
          type: array
          items:
            type: string
          description: 关键事件
        featured_characters:
          type: array
          items:
            type: string
          description: 出场角色
        featured_locations:
          type: array
          items:
            type: string
          description: 出场场景

    OutlineData:
      type: object
      required:
        - world_setting
        - main_conflict
        - characters
        - locations
        - episode_count
        - episodes
      properties:
        world_setting:
          type: string
          description: 世界观设定
        main_conflict:
          type: string
          description: 主要冲突
        characters:
          type: array
          items:
            $ref: '#/components/schemas/OutlineCharacter'
          description: 角色列表
        locations:
          type: array
          items:
            $ref: '#/components/schemas/OutlineLocation'
          description: 场景列表
        episode_count:
          type: integer
          minimum: 1
          description: 总集数
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/OutlineEpisode'
          description: 分集大纲

    UpdateOutlineRequest:
      type: object
      properties:
        world_setting:
          type: string
          minLength: 1
        main_conflict:
          type: string
          minLength: 1
        characters:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutlineCharacter'
        locations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutlineLocation'
        episode_count:
          type: integer
          minimum: 1
        episodes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutlineEpisode'

    OutlineSummary:
      type: object
      required:
        - outline
        - outline_locked
        - project_status
      properties:
        outline:
          oneOf:
            - $ref: '#/components/schemas/OutlineData'
            - type: 'null'
          description: 大纲数据，未生成时为 null
        outline_locked:
          type: boolean
          description: 大纲是否已锁定
        project_status:
          type: string
          enum:
            - draft
            - outlining
            - asset_prep
            - producing
            - completed
          description: 项目状态

    RegenerateEpisodeResponse:
      type: object
      required:
        - episode
        - episode_number
      properties:
        episode:
          $ref: '#/components/schemas/OutlineEpisode'
          description: 重新生成的单集数据
        episode_number:
          type: integer
          minimum: 1
          description: 集号

    CheckSeverity:
      type: string
      enum:
        - error
        - warning
        - pass
      description: 检查结果严重度

    CheckItem:
      type: object
      required:
        - severity
        - type
        - message
      properties:
        severity:
          $ref: '#/components/schemas/CheckSeverity'
        type:
          type: string
          description: 检查项名称（如 角色位置矛盾、道具状态追踪、情绪曲线合理性、服装连续性、整体一致性）
        message:
          type: string
          description: 检查结果描述
        details:
          type: string
          description: 详细说明

    OutlineValidationReport:
      type: object
      required:
        - errors
        - warnings
        - passes
        - passed
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/CheckItem'
          description: 红色错误列表
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/CheckItem'
          description: 黄色警告列表
        passes:
          type: array
          items:
            $ref: '#/components/schemas/CheckItem'
          description: 绿色通过列表
        passed:
          type: boolean
          description: 整体是否通过（无红色错误）

    MusicSegment:
      type: object
      properties:
        node_id:
          type: string
        start_time:
          type: number
        duration:
          type: number
        url:
          type: string
          format: uri
        volume:
          type: number
          minimum: 0
          maximum: 1
        ducked:
          type: boolean
        crossfade_in:
          type: number
        crossfade_out:
          type: number

    EmotionTransitionWarning:
      type: object
      properties:
        type:
          type: string
          enum:
            - emotion_transition
        from_node:
          type: string
        to_node:
          type: string
        from_mood:
          type: string
        to_mood:
          type: string
        message:
          type: string

    EpisodeMusicResult:
      type: object
      properties:
        episode_id:
          type: string
        original_url:
          type: string
          format: uri
        duration:
          type: number
        segments:
          type: array
          items:
            $ref: '#/components/schemas/MusicSegment'
        generated_at:
          type: string
          format: date-time
        provider:
          type: string
        model:
          type: string
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/EmotionTransitionWarning'

    RenderOptions:
      type: object
      properties:
        provider:
          type: string
          maxLength: 50
        resolution:
          type: string
          enum:
            - 1080x1920
            - 1920x1080
        fps:
          type: integer
          enum:
            - 24
            - 30
        codec:
          type: string
          enum:
            - h264
            - h265
        subtitles_enabled:
          type: boolean
        subtitle_style:
          type: string
          enum:
            - white_with_black_border
            - white
            - black
        subtitle_position:
          type: string
          enum:
            - bottom
            - top
        subtitle_size:
          type: string
          enum:
            - small
            - medium
            - large
        music_duck_dialogue:
          type: number
          minimum: 0.2
          maximum: 0.4
        music_duck_nondialogue:
          type: number
          minimum: 0.6
          maximum: 0.9
        strong_emotion_transition:
          type: string
          enum:
            - white_flash
            - black_fade

    SubtitleCue:
      type: object
      required:
        - start_time
        - end_time
        - text
        - node_id
      properties:
        start_time:
          type: number
        end_time:
          type: number
        text:
          type: string
        node_id:
          type: string

    TransitionRecord:
      type: object
      required:
        - from_node_id
        - to_node_id
        - transition_type
        - duration
      properties:
        from_node_id:
          type: string
        to_node_id:
          type: string
        transition_type:
          type: string
          enum:
            - cut
            - dissolve
            - fade
            - white_flash
            - black_fade
        duration:
          type: number

    EpisodeRenderOutput:
      type: object
      required:
        - episode_id
        - status
        - progress_percent
        - subtitle_cues
        - transitions
        - started_at
      properties:
        episode_id:
          type: string
        status:
          type: string
          enum:
            - pending
            - queued
            - concatenating
            - mixing
            - burning_subtitles
            - encoding
            - completed
            - failed
        progress_percent:
          type: integer
          minimum: 0
          maximum: 100
        output_url:
          type: string
          format: uri
          nullable: true
        output_duration:
          type: number
          nullable: true
        resolution:
          type: string
        fps:
          type: integer
        codec:
          type: string
        subtitle_cues:
          type: array
          items:
            $ref: '#/components/schemas/SubtitleCue'
        transitions:
          type: array
          items:
            $ref: '#/components/schemas/TransitionRecord'
        started_at:
          type: string
          format: date-time
        queued_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true
        job_id:
          type: string
          nullable: true

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
