openapi: 3.0.3
info:
  title: 极简栈创造 AI 生成接口
  description: |
    涉及 AI 适配器层的对外接口规范，包括模型绑定、生成任务、Adapter 健康检查。
  version: 1.0.0
  contact:
    name: Core · 后端工程师
servers:
  - url: /api/v1
    description: 本地开发服务

paths:
  /projects:
    get:
      summary: 列出项目
      description: 返回当前用户的项目列表，支持状态筛选、标题搜索、排序和分页。
      operationId: listProjects
      tags:
        - Projects
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/ProjectStatus'
        - name: search
          in: query
          schema:
            type: string
          description: 标题关键字搜索
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - updated_at_asc
              - updated_at_desc
            default: updated_at_desc
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/ProjectList'
    post:
      summary: 创建项目
      description: 创建新项目，初始状态为 draft，不触发 AI 生成。
      operationId: createProject
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'

  /projects/{projectId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取项目详情
      operationId: getProject
      tags:
        - Projects
      responses:
        '200':
          description: 项目详情
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: 更新项目
      operationId: updateProject
      tags:
        - Projects
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 删除项目
      operationId: deleteProject
      tags:
        - Projects
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 列出项目角色
      description: 返回指定项目下的所有角色卡片。
      operationId: listCharacters
      tags:
        - Characters
      responses:
        '200':
          description: 角色列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/CharacterList'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: 创建角色卡片
      description: 手动创建角色卡片。
      operationId: createCharacter
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCharacterRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/auto-create:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 根据大纲自动创建角色
      description: 根据已确认大纲中的 characters[] 批量创建角色卡片。
      operationId: autoCreateCharacters
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutoCreateCharactersRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取角色详情
      operationId: getCharacter
      tags:
        - Characters
      responses:
        '200':
          description: 角色详情
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: 更新角色卡片
      description: 更新角色字段，自动触发版本快照。
      operationId: updateCharacter
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCharacterRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: 删除角色
      operationId: deleteCharacter
      tags:
        - Characters
      responses:
        '204':
          description: 删除成功
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/generate-views:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成三视图
      description: 为角色生成正面、侧面、背面三视图。
      operationId: generateCharacterViews
      tags:
        - Characters
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateViewsRequest'
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/generate-views/{viewId}/retry:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: viewId
        in: path
        required: true
        schema:
          type: string
          enum:
            - front
            - side
            - back
    post:
      summary: 重新生成单张视图
      description: 对指定视图（front/side/back）重新生成。
      operationId: retryCharacterView
      tags:
        - Characters
      responses:
        '200':
          description: 重新生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/confirm-views:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认三视图
      description: 确认三视图并锁定参考图，自动触发扩展参考图生成。
      operationId: confirmCharacterViews
      tags:
        - Characters
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/generate-refs:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成扩展参考图
      description: 生成表情组（4 张）与场景站立图（2 张）。
      operationId: generateCharacterRefs
      tags:
        - Characters
      responses:
        '200':
          description: 生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/characters/{characterId}/rollback:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: characterId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 回滚到指定版本
      description: 基于历史版本快照恢复角色数据。
      operationId: rollbackCharacter
      tags:
        - Characters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackCharacterRequest'
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Character'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 列出项目场景卡片
      description: 返回指定项目下的所有场景（location）卡片。
      operationId: listLocations
      tags:
        - Locations
      responses:
        '200':
          description: 场景卡片列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/LocationList'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      summary: 更新场景卡片
      description: 更新场景字段，自动触发版本快照。
      operationId: updateLocation
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLocationRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/generate-base:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成基准候选图
      description: 基于场景字段生成 3 张基准候选图，返回候选 URL 与 seed，不持久化。
      operationId: generateBaseCandidates
      tags:
        - Locations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateBaseCandidatesRequest'
      responses:
        '200':
          description: 候选图列表
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BaseCandidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/confirm-base:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认基准图
      description: 确认选中的基准候选图，持久化 base_seed 与 base_image_url，触发版本快照。
      operationId: confirmBaseImage
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmBaseRequest'
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/generate-variant:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成变体图
      description: 基于已确认的 base_seed 与固定偏移生成指定变体图，返回 URL 与 seed，不持久化。
      operationId: generateLocationVariant
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateVariantRequest'
      responses:
        '200':
          description: 变体图结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/VariantResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/confirm-variant:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认变体图
      description: 确认变体图并持久化到 variants 字典，key 为 `{time_of_day}-{weather}`，触发版本快照。
      operationId: confirmLocationVariant
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmVariantRequest'
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/versions:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取场景历史版本
      description: 返回场景卡片的版本快照列表（不含完整 content）。
      operationId: listLocationVersions
      tags:
        - Locations
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 版本历史
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/SnapshotHistory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/locations/{locationId}/rollback:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: locationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 回滚场景到指定版本
      description: 基于历史版本快照恢复场景卡片数据。
      operationId: rollbackLocation
      tags:
        - Locations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackLocationRequest'
      responses:
        '200':
          description: 回滚成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: 获取大纲
      description: 返回当前项目的大纲数据及锁定状态。无大纲时返回 outline: null 而非 404。
      operationId: getOutline
      tags:
        - Outline
      responses:
        '200':
          description: 大纲摘要（含锁定状态）
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineSummary'
    put:
      summary: 更新大纲
      description: 保存用户编辑后的大纲，自动创建 user_edited 版本快照。
      operationId: updateOutline
      tags:
        - Outline
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOutlineRequest'
      responses:
        '200':
          description: 更新后的大纲
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/generate:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 生成大纲
      description: 调用文本 AI 生成结构化大纲，存储到 project.outline 字段并创建 ai_generated 版本快照。
      operationId: generateOutline
      tags:
        - Outline
      responses:
        '201':
          description: 大纲生成成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/validate:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 剧本医生自洽性检查
      description: 执行大纲自洽性检查（角色位置矛盾、道具状态追踪、情绪曲线、服装连续性），返回检查报告。
      operationId: validateOutline
      tags:
        - Outline
      responses:
        '200':
          description: 检查报告
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineValidationReport'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/confirm:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      summary: 确认并锁定大纲
      description: 锁定大纲（outline_locked = true），项目状态变更为 asset_prep。存在红色错误时拒绝锁定。
      operationId: confirmOutline
      tags:
        - Outline
      responses:
        '200':
          description: 确认成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/OutlineData'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/outline/episodes/{episodeNumber}/regenerate:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: episodeNumber
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    post:
      summary: 重新生成单集
      description: 仅重新生成指定集的内容，不影响大纲中其他集数据。
      operationId: regenerateEpisode
      tags:
        - Outline
      responses:
        '200':
          description: 重新生成后的单集
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/RegenerateEpisodeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/model-bindings:
    get:
      summary: 获取项目模型绑定
      description: 返回项目在各生成节点上使用的 AI 模型配置（主模型 + fallback 链）。
      operationId: getProjectModelBindings
      tags:
        - Model Bindings
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 项目模型绑定配置
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectModelBindings'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      summary: 更新项目模型绑定
      description: |
        修改项目默认模型绑定或某个节点的模型绑定。切换后下次生成生效。
      operationId: updateProjectModelBindings
      tags:
        - Model Bindings
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectModelBindings'
      responses:
        '200':
          description: 更新后的模型绑定
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectModelBindings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/generate:
    post:
      summary: 创建 AI 生成任务
      description: |
        根据节点类型和模型绑定创建生成任务。任务进入 BullMQ 队列，
        通过 SSE `/events/{jobId}` 推送进度。
      operationId: createGenerationTask
      tags:
        - Generation
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerationTaskRequest'
      responses:
        '202':
          description: 任务已接受
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationTaskResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /adapters/health:
    get:
      summary: 获取 Adapter 健康状态
      description: 返回所有已注册 Adapter 的最新健康检查结果。
      operationId: getAdapterHealth
      tags:
        - Adapters
      responses:
        '200':
          description: Adapter 健康报告
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterHealthReport'

  /adapters/providers:
    get:
      summary: 列出可用 Adapter Provider
      description: 返回按任务类型分类的已注册 provider 列表。
      operationId: listAdapterProviders
      tags:
        - Adapters
      responses:
        '200':
          description: Provider 列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdapterProviderList'

  /projects/{projectId}/entities/{entityType}/{entityId}/versions:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: entityType
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/EntityType'
      - name: entityId
        in: path
        required: true
        schema:
          type: string

    get:
      summary: 获取实体的版本历史
      description: 返回指定实体的版本快照列表（不含完整 content），按版本号降序排列。
      operationId: listVersionSnapshots
      tags:
        - Version Snapshots
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 版本历史
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotHistory'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: 创建版本快照
      description: |
        为指定实体创建新版本快照。首次创建时 parent_version 为空，
        后续版本自动计算与上一版本的字段级 diff。
      operationId: createVersionSnapshot
      tags:
        - Version Snapshots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/entities/{entityType}/{entityId}/versions/compare:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: entityType
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/EntityType'
      - name: entityId
        in: path
        required: true
        schema:
          type: string

    get:
      summary: 对比两个版本
      description: 返回 from 到 to 两个版本之间的字段级 diff。
      operationId: compareVersionSnapshots
      tags:
        - Version Snapshots
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: '^v\d+$'
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: '^v\d+$'
      responses:
        '200':
          description: 对比结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/DiffResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/entities/{entityType}/{entityId}/versions/{versionId}:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: entityType
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/EntityType'
      - name: entityId
        in: path
        required: true
        schema:
          type: string
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          pattern: '^v\d+$'

    get:
      summary: 获取单个版本快照
      description: 返回指定版本的完整快照，包括 content。
      operationId: getVersionSnapshot
      tags:
        - Version Snapshots
      responses:
        '200':
          description: 版本快照详情
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Snapshot'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/entities/{entityType}/{entityId}/versions/{versionId}/rollback:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: entityType
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/EntityType'
      - name: entityId
        in: path
        required: true
        schema:
          type: string
      - name: versionId
        in: path
        required: true
        schema:
          type: string
          pattern: '^v\d+$'

    post:
      summary: 回滚到指定版本
      description: |
        基于指定历史版本的内容创建一个新版本（source 为 user_edited），
        并触发变更传播，将下游节点标记为「需检查」。
      operationId: rollbackVersionSnapshot
      tags:
        - Version Snapshots
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
      responses:
        '201':
          description: 回滚成功，返回新版本快照
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    ProjectStatus:
      type: string
      enum:
        - draft
        - outlining
        - asset_prep
        - producing
        - completed

    ProjectGenre:
      type: string
      enum:
        - urban_romance
        - ancient_costume
        - suspense
        - comedy
        - sci_fi
        - other

    ProjectDurationGoal:
      type: string
      enum:
        - 3min
        - 5min
        - 10min

    ProjectStyleTag:
      type: string
      enum:
        - realistic
        - comic
        - cyberpunk
        - chinese_style
        - fresh
        - dark

    ProjectMeta:
      type: object
      required:
        - title
        - description
        - genre
        - style_tags
      properties:
        title:
          type: string
          maxLength: 50
          description: 项目标题
        description:
          type: string
          maxLength: 1000
          description: 创意描述
        genre:
          $ref: '#/components/schemas/ProjectGenre'
        target_episodes:
          type: integer
          minimum: 1
          maximum: 100
          nullable: true
          description: 目标集数，留空表示由 AI 后续建议
        duration_goal:
          $ref: '#/components/schemas/ProjectDurationGoal'
          nullable: true
          description: 时长目标
        style_tags:
          type: array
          items:
            $ref: '#/components/schemas/ProjectStyleTag'
          description: 风格标签
        notes:
          type: string
          maxLength: 2000
          nullable: true
          description: 创作备注

    Project:
      type: object
      required:
        - id
        - user_id
        - status
        - meta
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        team_id:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/ProjectStatus'
        meta:
          $ref: '#/components/schemas/ProjectMeta'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectList:
      type: object
      required:
        - total
        - projects
      properties:
        total:
          type: integer
        projects:
          type: array
          items:
            $ref: '#/components/schemas/Project'

    CreateProjectRequest:
      type: object
      required:
        - meta
      properties:
        meta:
          $ref: '#/components/schemas/ProjectMeta'

    UpdateProjectRequest:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/ProjectMeta'
        status:
          $ref: '#/components/schemas/ProjectStatus'

    ModelConfig:
      type: object
      required:
        - provider
        - model
      properties:
        provider:
          type: string
          description: Provider ID，对应已注册的 Adapter
          example: mock-text
        model:
          type: string
          description: 模型标识
          example: mock-model
        apiKey:
          type: string
          description: 运行时注入的 API Key，不持久化
          writeOnly: true
        baseUrl:
          type: string
          format: uri
          description: 自定义 endpoint
        extraParams:
          type: object
          description: 供应商特有参数透传
        timeoutMs:
          type: integer
          description: 请求超时毫秒
          example: 30000
        maxRetries:
          type: integer
          description: 最大重试次数
          example: 2

    ModelBinding:
      type: object
      required:
        - taskType
        - primary
      properties:
        taskType:
          type: string
          enum:
            - text
            - image
            - video
            - tts
            - music
          description: 任务类型
        primary:
          $ref: '#/components/schemas/ModelConfig'
        fallbacks:
          type: array
          description: 按优先级排序的备用模型配置
          items:
            $ref: '#/components/schemas/ModelConfig'

    ProjectModelBindings:
      type: object
      required:
        - outline
        - script
        - storyboard
        - character_img
        - scene_img
        - video
        - video_fallback
        - tts
        - music
      properties:
        outline:
          $ref: '#/components/schemas/ModelBinding'
        script:
          $ref: '#/components/schemas/ModelBinding'
        storyboard:
          $ref: '#/components/schemas/ModelBinding'
        character_img:
          $ref: '#/components/schemas/ModelBinding'
        scene_img:
          $ref: '#/components/schemas/ModelBinding'
        video:
          $ref: '#/components/schemas/ModelBinding'
        video_fallback:
          $ref: '#/components/schemas/ModelBinding'
        tts:
          $ref: '#/components/schemas/ModelBinding'
        music:
          $ref: '#/components/schemas/ModelBinding'

    GenerationTaskRequest:
      type: object
      required:
        - taskType
        - nodeId
        - params
      properties:
        taskType:
          type: string
          enum:
            - text
            - image
            - video
            - tts
            - music
          description: 生成任务类型
        nodeId:
          type: string
          description: 触发生成的节点 ID
        episodeId:
          type: string
          description: 所属单集 ID
        params:
          type: object
          description: 生成参数，按任务类型不同
        modelBinding:
          $ref: '#/components/schemas/ModelBinding'
          description: 节点级模型绑定覆盖，不传则使用项目默认

    GenerationTaskResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - queued
            - running
            - completed
            - failed
        eventsUrl:
          type: string
          format: uri
          description: SSE 进度推送地址
          example: /api/v1/events/{jobId}

    AdapterHealthReport:
      type: object
      required:
        - text
        - image
        - video
        - tts
        - music
      properties:
        text:
          $ref: '#/components/schemas/ProviderHealthMap'
        image:
          $ref: '#/components/schemas/ProviderHealthMap'
        video:
          $ref: '#/components/schemas/ProviderHealthMap'
        tts:
          $ref: '#/components/schemas/ProviderHealthMap'
        music:
          $ref: '#/components/schemas/ProviderHealthMap'

    ProviderHealthMap:
      type: object
      additionalProperties:
        type: string
        enum:
          - available
          - degraded
          - unavailable

    AdapterProviderList:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            type: object
            required:
              - taskType
              - provider
            properties:
              taskType:
                type: string
                enum:
                  - text
                  - image
                  - video
                  - tts
                  - music
              provider:
                type: string

    EntityType:
      type: string
      enum:
        - project
        - outline
        - character
        - scene
        - script
        - node
        - generation_result
        - location
      description: 可编辑实体类型

    SnapshotSource:
      type: string
      enum:
        - ai_generated
        - user_edited
        - ai_regenerated
        - locked
      description: 版本快照来源

    AIModelInfo:
      type: object
      required:
        - provider
        - model
      properties:
        provider:
          type: string
          example: openai
        model:
          type: string
          example: gpt-4o

    SnapshotMeta:
      type: object
      required:
        - id
        - versionId
        - versionNumber
        - source
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        versionId:
          type: string
          example: v3
          pattern: '^v\d+$'
        versionNumber:
          type: integer
          example: 3
        source:
          $ref: '#/components/schemas/SnapshotSource'
        editedBy:
          type: string
          nullable: true
          description: 用户编辑时的用户 ID
        aiModel:
          $ref: '#/components/schemas/AIModelInfo'
          nullable: true
          description: AI 生成时记录的模型配置
        promptOverride:
          type: string
          nullable: true
          description: 用户给 AI 的额外指令
        parentVersionNumber:
          type: integer
          nullable: true
          description: 父版本号
        createdAt:
          type: string
          format: date-time

    Snapshot:
      allOf:
        - $ref: '#/components/schemas/SnapshotMeta'
        - type: object
          required:
            - content
            - diff
          properties:
            content:
              type: object
              description: 该版本的完整内容
            diff:
              type: object
              additionalProperties:
                type: string
                enum:
                  - added
                  - changed
                  - removed
              description: 与父版本的字段级差异

    SnapshotHistory:
      type: object
      required:
        - total
        - versions
      properties:
        total:
          type: integer
        versions:
          type: array
          items:
            $ref: '#/components/schemas/SnapshotMeta'

    DiffResult:
      type: object
      required:
        - fromVersionId
        - toVersionId
        - diff
      properties:
        fromVersionId:
          type: string
          example: v1
        toVersionId:
          type: string
          example: v3
        diff:
          type: object
          additionalProperties:
            type: string
            enum:
              - added
              - changed
              - removed
          description: 字段级差异，键为点号路径

    SnapshotCreateRequest:
      type: object
      required:
        - source
        - content
      properties:
        source:
          $ref: '#/components/schemas/SnapshotSource'
        content:
          type: object
          description: 该版本的完整内容
        edited_by:
          type: string
          description: 用户编辑时的用户 ID
        ai_model:
          $ref: '#/components/schemas/AIModelInfo'
        prompt_override:
          type: string
          description: 用户给 AI 的额外指令

    RollbackRequest:
      type: object
      properties:
        edited_by:
          type: string
          description: 执行回滚的用户 ID

    CharacterRoleType:
      type: string
      enum:
        - protagonist
        - supporting
        - antagonist
      description: 角色定位

    CharacterStatus:
      type: string
      enum:
        - draft
        - confirmed
      description: 角色状态

    CharacterRefImage:
      type: object
      required:
        - view
        - url
        - seed
      properties:
        view:
          type: string
          description: 视图或参考图类型标识
        url:
          type: string
          format: uri
          description: 图片 URL
        seed:
          type: integer
          description: 生成使用的种子

    Character:
      type: object
      required:
        - id
        - project_id
        - name
        - role_type
        - status
        - ref_images
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        role_type:
          $ref: '#/components/schemas/CharacterRoleType'
        episode_range:
          type: string
          nullable: true
          description: 登场集数范围
        appearance:
          type: string
          nullable: true
          description: 外貌描述
        costume:
          type: string
          nullable: true
          description: 服装方案
        expression:
          type: string
          nullable: true
          description: 表情特征
        signature_action:
          type: string
          nullable: true
          description: 标志性动作
        voice_description:
          type: string
          nullable: true
          description: 声线描述
        status:
          $ref: '#/components/schemas/CharacterStatus'
        ref_images:
          type: array
          items:
            $ref: '#/components/schemas/CharacterRefImage'
        ip_adapter_id:
          type: string
          nullable: true
          description: IP-Adapter 角色 Embedding ID
        lora_path:
          type: string
          nullable: true
          description: LoRA 模型路径
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CharacterList:
      type: object
      required:
        - total
        - characters
      properties:
        total:
          type: integer
        characters:
          type: array
          items:
            $ref: '#/components/schemas/Character'

    CreateCharacterRequest:
      type: object
      required:
        - name
        - role_type
      properties:
        name:
          type: string
          maxLength: 100
        role_type:
          $ref: '#/components/schemas/CharacterRoleType'
        episode_range:
          type: string
          maxLength: 50
          nullable: true
        appearance:
          type: string
          maxLength: 2000
          nullable: true
        costume:
          type: string
          maxLength: 2000
          nullable: true
        expression:
          type: string
          maxLength: 2000
          nullable: true
        signature_action:
          type: string
          maxLength: 500
          nullable: true
        voice_description:
          type: string
          maxLength: 500
          nullable: true
        status:
          $ref: '#/components/schemas/CharacterStatus'

    UpdateCharacterRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        role_type:
          $ref: '#/components/schemas/CharacterRoleType'
        episode_range:
          type: string
          maxLength: 50
          nullable: true
        appearance:
          type: string
          maxLength: 2000
          nullable: true
        costume:
          type: string
          maxLength: 2000
          nullable: true
        expression:
          type: string
          maxLength: 2000
          nullable: true
        signature_action:
          type: string
          maxLength: 500
          nullable: true
        voice_description:
          type: string
          maxLength: 500
          nullable: true
        status:
          $ref: '#/components/schemas/CharacterStatus'

    AutoCreateCharactersRequest:
      type: object
      required:
        - characters
      properties:
        characters:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateCharacterRequest'

    GenerateViewsRequest:
      type: object
      properties:
        seed:
          type: integer
          description: 固定种子，不传则根据角色 ID 与视图计算
        width:
          type: integer
        height:
          type: integer
        style_preset:
          type: string

    RollbackCharacterRequest:
      type: object
      required:
        - version_id
      properties:
        version_id:
          type: string
          pattern: '^v\d+$'
          description: 目标版本号

    LocationStatus:
      type: string
      enum:
        - draft
        - confirmed
      description: 场景卡片状态

    LocationVariant:
      type: object
      required:
        - image_url
        - prompt
        - seed
      properties:
        image_url:
          type: string
          format: uri
        prompt:
          type: string
        seed:
          type: integer

    Location:
      type: object
      required:
        - id
        - project_id
        - name
        - status
        - key_props
        - variants
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        frequency:
          type: string
          nullable: true
        space_type:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
        color_tone:
          type: string
          nullable: true
        lighting_type:
          type: string
          nullable: true
        key_props:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/LocationStatus'
        base_seed:
          type: integer
          nullable: true
        base_image_url:
          type: string
          format: uri
          nullable: true
        variants:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/LocationVariant'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LocationList:
      type: object
      required:
        - total
        - locations
      properties:
        total:
          type: integer
        locations:
          type: array
          items:
            $ref: '#/components/schemas/Location'

    UpdateLocationRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 2000
          nullable: true
        frequency:
          type: string
          maxLength: 50
          nullable: true
        space_type:
          type: string
          maxLength: 50
          nullable: true
        style:
          type: string
          maxLength: 200
          nullable: true
        color_tone:
          type: string
          maxLength: 100
          nullable: true
        lighting_type:
          type: string
          maxLength: 100
          nullable: true
        key_props:
          type: array
          items:
            type: string
        status:
          $ref: '#/components/schemas/LocationStatus'

    BaseCandidate:
      type: object
      required:
        - url
        - seed
        - prompt
      properties:
        url:
          type: string
          format: uri
        seed:
          type: integer
        prompt:
          type: string

    GenerateBaseCandidatesRequest:
      type: object
      properties:
        seed:
          type: integer
          description: 固定种子，不传则根据 locationId 计算

    ConfirmBaseRequest:
      type: object
      required:
        - candidate
      properties:
        candidate:
          $ref: '#/components/schemas/BaseCandidate'

    VariantResult:
      type: object
      required:
        - url
        - seed
        - prompt
      properties:
        url:
          type: string
          format: uri
        seed:
          type: integer
        prompt:
          type: string

    GenerateVariantRequest:
      type: object
      required:
        - time_of_day
        - weather
      properties:
        time_of_day:
          type: string
        weather:
          type: string

    ConfirmVariantRequest:
      type: object
      required:
        - time_of_day
        - weather
        - variant
      properties:
        time_of_day:
          type: string
        weather:
          type: string
        variant:
          $ref: '#/components/schemas/VariantResult'

    RollbackLocationRequest:
      type: object
      required:
        - version_id
      properties:
        version_id:
          type: string
          pattern: '^v\d+$'
          description: 目标版本号

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 统一错误码
          example: AI_TIMEOUT
        message:
          type: string
          description: 错误信息（不暴露堆栈）
        retryable:
          type: boolean
          description: 是否为可用性错误，可触发 fallback

    # ── Outline Schemas ────────────────────────────────────────────

    OutlineCharacter:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: 角色名
        role_type:
          type: string
          enum:
            - protagonist
            - supporting
            - antagonist
          description: 角色定位（AI 生成时必填，前端更新时可省略）
        description:
          type: string
          description: 角色描述

    OutlineLocation:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          description: 场景名
        description:
          type: string
          description: 场景描述

    OutlineEpisode:
      type: object
      required:
        - episode_number
        - title
        - summary
        - key_events
        - featured_characters
        - featured_locations
      properties:
        episode_number:
          type: integer
          minimum: 1
          description: 集号
        title:
          type: string
          description: 集标题
        summary:
          type: string
          description: 集摘要
        key_events:
          type: array
          items:
            type: string
          description: 关键事件
        featured_characters:
          type: array
          items:
            type: string
          description: 出场角色
        featured_locations:
          type: array
          items:
            type: string
          description: 出场场景

    OutlineData:
      type: object
      required:
        - world_setting
        - main_conflict
        - characters
        - locations
        - episode_count
        - episodes
      properties:
        world_setting:
          type: string
          description: 世界观设定
        main_conflict:
          type: string
          description: 主要冲突
        characters:
          type: array
          items:
            $ref: '#/components/schemas/OutlineCharacter'
          description: 角色列表
        locations:
          type: array
          items:
            $ref: '#/components/schemas/OutlineLocation'
          description: 场景列表
        episode_count:
          type: integer
          minimum: 1
          description: 总集数
        episodes:
          type: array
          items:
            $ref: '#/components/schemas/OutlineEpisode'
          description: 分集大纲

    UpdateOutlineRequest:
      type: object
      properties:
        world_setting:
          type: string
          minLength: 1
        main_conflict:
          type: string
          minLength: 1
        characters:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutlineCharacter'
        locations:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutlineLocation'
        episode_count:
          type: integer
          minimum: 1
        episodes:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutlineEpisode'

    OutlineSummary:
      type: object
      required:
        - outline
        - outline_locked
        - project_status
      properties:
        outline:
          oneOf:
            - $ref: '#/components/schemas/OutlineData'
            - type: 'null'
          description: 大纲数据，未生成时为 null
        outline_locked:
          type: boolean
          description: 大纲是否已锁定
        project_status:
          type: string
          enum:
            - draft
            - outlining
            - asset_prep
            - producing
            - completed
          description: 项目状态

    RegenerateEpisodeResponse:
      type: object
      required:
        - episode
        - episode_number
      properties:
        episode:
          $ref: '#/components/schemas/OutlineEpisode'
          description: 重新生成的单集数据
        episode_number:
          type: integer
          minimum: 1
          description: 集号

    CheckSeverity:
      type: string
      enum:
        - error
        - warning
        - pass
      description: 检查结果严重度

    CheckItem:
      type: object
      required:
        - severity
        - type
        - message
      properties:
        severity:
          $ref: '#/components/schemas/CheckSeverity'
        type:
          type: string
          description: 检查项名称（如 角色位置矛盾、道具状态追踪、情绪曲线合理性、服装连续性、整体一致性）
        message:
          type: string
          description: 检查结果描述
        details:
          type: string
          description: 详细说明

    OutlineValidationReport:
      type: object
      required:
        - errors
        - warnings
        - passes
        - passed
      properties:
        errors:
          type: array
          items:
            $ref: '#/components/schemas/CheckItem'
          description: 红色错误列表
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/CheckItem'
          description: 黄色警告列表
        passes:
          type: array
          items:
            $ref: '#/components/schemas/CheckItem'
          description: 绿色通过列表
        passed:
          type: boolean
          description: 整体是否通过（无红色错误）

  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
