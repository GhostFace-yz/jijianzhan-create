        '404':
          $ref: '#/components/responses/NotFound'

    post:
      summary: 创建版本快照
      description: |
        为指定实体创建新版本快照。首次创建时 parent_version 为空，
        后续版本自动计算与上一版本的字段级 diff。
      operationId: createVersionSnapshot
      tags:
        - Version Snapshots
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SnapshotCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Snapshot'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/entities/{entityType}/{entityId}/versions/compare:
    parameters:
      - name: projectId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: entityType
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/EntityType'
      - name: entityId
        in: path
        required: true
        schema:
          type: string

    get:
      summary: 对比两个版本
      description: 返回 from 到 to 两个版本之间的字段级 diff。
      operationId: compareVersionSnapshots
      tags:
        - Version Snapshots
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            pattern: '^v\d+$'
        - name: to
          in: query
          required: true
          schema:
            type: string
            pattern: '^v\d+$'
      responses:
        '200':
          description: 对比结果
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/DiffResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/entities/{entityType}/{entityId}/versions/{versionId}:
