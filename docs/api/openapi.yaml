          type: string

    get:
      summary: 获取实体的版本历史
      description: 返回指定实体的版本快照列表（不含完整 content），按版本号降序排列。
      operationId: listVersionSnapshots
      tags:
        - Version Snapshots
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: 版本历史
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SnapshotHistory'
