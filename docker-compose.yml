services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: jijianzhan
      POSTGRES_PASSWORD: jijianzhan
      POSTGRES_DB: jijianzhan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jijianzhan -d jijianzhan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://jijianzhan:jijianzhan@postgres:5432/jijianzhan
      - REDIS_URL=redis://redis:6379
      - RENDER_PROVIDER=ffmpeg-render
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - RENDER_OUTPUT_BUCKET=renders
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["node", "dist/server/index.js"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://jijianzhan:jijianzhan@postgres:5432/jijianzhan
      - REDIS_URL=redis://redis:6379
      - RENDER_PROVIDER=ffmpeg-render
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_USE_SSL=false
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - RENDER_OUTPUT_BUCKET=renders
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: ["node", "dist/server/workers/render-worker.js"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
